	<style type= "text/css" >
.quorum-chart {
 --quorum-focus-outline:5px solid rgb(240.0,94.0,93.0);
 --quorum-hover-outline:5px solid rgb(240.0,94.0,93.0);
}

.quorum-chart:has(.selection-box410202651516479513940:hover) {
 --quorum-focus-outline: transparent;
}
.selection-box410202651516479513940:focus {
 outline: var(--quorum-focus-outline);
 outline-offset: 2px;
 animation: blink-animation 1s steps(5, start) infinite;
 animation-delay: 1s;
 border-radius: 5px;
 z-index: 10;
}

g.selection-box410202651516479513940:focus > rect {
 outline: var(--quorum-focus-outline);
 outline-offset: 2px;
 animation: blink-animation 1s steps(5, start) infinite;
 animation-delay: 1s;
 border-radius: 5px;
 z-index: 10;
}

.selection-box410202651516479513940:not(:has(.selection-box410202651516479513940:hover)):hover {
 outline: var(--quorum-hover-outline);
 outline-offset: 2px;
 animation: blink-animation 1s steps(5, start) infinite;
 animation-delay: 1s;
 border-radius: 5px;
 z-index: 10;
}

g.selection-box410202651516479513940 > path:focus {
 outline: var(-quorum-focus-outline);
 outline-offset: 2px;
 animation: blink-animation 1s steps(5, start) infinite;
 animation-delay: 1s;
 border-radius: 5px;
 z-index: 10;
}

circle.selection-box410202651516479513940:focus {
  border-radius: 50%;
}

g.selection-box410202651516479513940:focus > circle{
  border-radius: 50%;
}

@keyframes blink-animation {
  0%, 49% {
    outline-color: rgb(240.0,94.0,93.0); /* Change to desired color at 50% of the animation */
  }
  50%, 100% {
    outline-color: transparent;
  }
}
.dot-container410202651516479513940:has(>g:focus) > g:not(:focus) {
 opacity: 0.15;
}
.dot-series410202651516479513940:focus {
 outline: none;
}
.quorum-chart-wedge:focus-within{
 outline: none;
 transform: translateX(calc(var(--unit-x) * 25)) translateY(calc(var(--unit-y) * 25));
}
.quorum-chart-wedge:hover{
 outline: none;
 transform: translateX(calc(var(--unit-x) * 25)) translateY(calc(var(--unit-y) * 25));
}
.quorum-chart-wedge:focus-within > * {
 outline: none;
 visibility: visible;
}
.crust {
 visibility: hidden;
}

.quorum-chart-wedge:focus + .small-slice-text {
 visibility: visible;
}

.quorum-chart-wedge:hover + .small-slice-text {
 visibility: visible;
}

.small-slice-text {
 visibility: hidden;
}

.quorum-ignore-click {
 pointer-events: none;
}
</style>
